<div class="cart-container">
  <h1 class="cart-title">Tu Carrito <span>(3 productos)</span></h1>

  <div class="cart-layout">
    <!-- SECCIÓN DE PRODUCTOS -->
    <section class="cart-items">
      <!-- Producto Individual (Repetir con @for en Angular) -->
      <div class="cart-card">
        <div class="product-info">
          <div class="product-details">
            <span class="product-name">Camiseta Minimalista</span>
            <span class="product-price-unit">Precio: $25.00</span>
          </div>
        </div>

        <div class="product-actions">
          <div class="quantity-selector">
            <button class="qty-btn">-</button>
            <span class="qty-number">2</span>
            <button class="qty-btn">+</button>
          </div>
          <span class="product-subtotal">$50.00</span>
          <button class="delete-btn" title="Eliminar">×</button>
        </div>
      </div>
      <!-- Fin Producto -->
    </section>

    <!-- SECCIÓN DE RESUMEN -->
    <aside class="cart-summary">
      <h2>Resumen de compra</h2>
      <div class="summary-row">
        <span>Subtotal</span>
        <span>$50.00</span>
      </div>
      <div class="summary-row text-green">
        <span>Envío</span>
        <span>Gratis</span>
      </div>
      <hr>
      <div class="summary-row total">
        <span>Total</span>
        <span>$50.00</span>
      </div>
      <button class="checkout-btn">Finalizar Compra</button>
      <a href="#" class="continue-shopping">Continuar comprando</a>
    </aside>
  </div>
</div>
