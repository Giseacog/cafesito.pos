<div class="carrito-container">
  <div class="productos-lista">
    <h2 class="titulo-carrito">Tu Carrito</h2>

    <div class="producto-item">
      <img
        src="https://via.placeholder.com/80"
        alt="Producto"
        class="img-producto"
      />
      <div class="info-producto">
        <h3>Nombre del Producto</h3>
        <p>Talla: M | Color: Negro</p>
      </div>
      <div class="selector-cantidad">
        <button class="btn-cantidad">-</button>
        <span class="cantidad">1</span>
        <button class="btn-cantidad">+</button>
      </div>
      <p class="precio">$45.00</p>
      <button class="btn-eliminar">×</button>
    </div>
  </div>

  <div class="resumen-pago">
    <h3 class="titulo-resumen">Resumen</h3>
    <div class="fila-resumen">
      <span>Subtotal</span>
      <span>$45.00</span>
    </div>
    <div class="fila-resumen">
      <span>Envío</span>
      <span class="envio-gratis">Gratis</span>
    </div>
    <hr />
    <div class="fila-resumen total">
      <span>Total</span>
      <span>$45.00</span>
    </div>
    <button class="btn-pagar">Finalizar Compra</button>
  </div>
</div>
